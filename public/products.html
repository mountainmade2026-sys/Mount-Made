<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c5f2d">
    <link rel="manifest" href="/manifest.json">
    <title>Products</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/mobile-enhancements.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <span class="nav-corner nav-corner-tl" aria-hidden="true"></span>
        <span class="nav-corner nav-corner-tr" aria-hidden="true"></span>
        <span class="nav-corner nav-corner-bl" aria-hidden="true"></span>
        <span class="nav-corner nav-corner-br" aria-hidden="true"></span>
        <div class="navbar-container">
            <button class="mobile-menu-toggle" aria-label="Open navigation menu">
                <i class="fas fa-bars"></i>
            </button>
            <a href="/" class="navbar-brand">
                <span class="navbar-tagline">GOURMET GROCERIES</span>
            </a>
            <ul class="navbar-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/products" class="active">Products</a></li>
                <li><a href="#product-categories" id="nav-categories-link">Categories</a></li>
                <li><a href="/about">About</a></li>
                <li id="admin-link" class="hidden"><a href="/admin">Admin</a></li>
            </ul>
            <div class="navbar-actions">
                <div id="auth-buttons"><a href="/login" class="btn btn-secondary btn-sm">Login</a></div>
                <div id="user-menu" class="hidden flex gap-2" style="align-items: center;">
                    <a href="/cart" class="icon-button"><i class="fas fa-shopping-cart"></i><span id="cart-badge" class="cart-badge hidden">0</span></a>
                    <div class="account-menu">
                        <button id="account-toggle" class="icon-button" title="Account">
                            <i class="fas fa-user-circle"></i>
                        </button>
                                                <div id="account-dropdown" class="account-dropdown hidden">
                            <div class="accd-header">
                                <div class="accd-avatar" id="account-avatar">U</div>
                                <div class="accd-user">
                                    <div class="accd-name" id="account-display-name">User</div>
                                    <div class="accd-role" id="account-display-role">Member</div>
                                </div>
                            </div>
                            <div class="accd-group">
                                <button class="accd-item" onclick="openProfileModal()">
                                    <span class="accd-icon"><i class="fas fa-user-edit"></i></span>Edit Profile
                                </button>
                                <a href="/orders" class="accd-item">
                                    <span class="accd-icon"><i class="fas fa-box-open"></i></span>My Orders
                                </a>
                                <a href="/addresses" class="accd-item accd-desktop-only">
                                    <span class="accd-icon"><i class="fas fa-map-marker-alt"></i></span>Manage Address
                                </a>
                                <button class="accd-item" onclick="openAccountManagementModal()">
                                    <span class="accd-icon"><i class="fas fa-key"></i></span>Change Password
                                </button>
                            </div>
                            <div class="accd-group">
                                <button id="theme-toggle" class="accd-item">
                                    <span class="accd-icon"><i class="fas fa-moon"></i></span>Switch to Dark Mode
                                </button>
                            </div>
                            <div class="accd-group accd-group-last">
                                <button id="account-logout" class="accd-item accd-item-danger">
                                    <span class="accd-icon"><i class="fas fa-sign-out-alt"></i></span>Logout
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <style>
        .products-layout {
            display: flex;
            gap: 2rem;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .product-card-link {
            display: block;
            color: inherit;
            text-decoration: none;
        }

        .product-card {
            position: relative;
            display: flex;
            flex-direction: column;
            border-radius: 14px;
            overflow: hidden;
            transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
            box-shadow: var(--shadow-sm);
            min-height: 420px;
            width: 100%;
            max-width: 320px;
            background: var(--bg-primary);
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-200);
        }

        .product-card .card-image-wrap {
            flex: 0 0 auto;
            width: 100%;
            height: 280px;
            min-height: 280px;
            overflow: hidden;
            background: var(--bg-secondary);
            position: relative;
            border-radius: 14px 14px 0 0;
            display: grid;
            place-items: center;
            padding: 0;
        }

        .product-card .card-body {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: var(--bg-primary);
            overflow: hidden;
        }

        .product-card .card-content {
            padding: 0.35rem 0.45rem 0.2rem;
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
        }

        .product-card-footer {
            display: flex !important;
            flex-wrap: wrap !important;
            align-items: center !important;
            justify-content: space-between !important;
            gap: 0.5rem !important;
            padding: 0.5rem !important;
            box-sizing: border-box !important;
            width: 100% !important;
        }

        .product-card-footer .product-action-row {
            display: flex !important;
            flex-wrap: wrap !important;
            width: 100% !important;
            gap: 0.5rem !important;
            justify-content: space-between !important;
        }

        .product-card-footer .product-action-row .btn {
            flex: 1 1 calc(50% - 0.25rem) !important;
            min-width: 0 !important;
            min-height: 42px !important;
            padding: 0.45rem 0.65rem !important;
            white-space: nowrap !important;
        }

        .product-card .card-image {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            object-position: center center !important;
            transition: transform 0.35s ease;
            display: block !important;
            border-radius: 14px 14px 0 0 !important;
            cursor: pointer;
        }

        .product-card:hover .card-image {
            transform: scale(1.04);
        }


        .product-card .rating-badge {
            position: absolute;
            left: 0.65rem;
            right: 0.65rem;
            bottom: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.45rem;
            background: rgba(15, 23, 42, 0.86);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            padding: 0.35rem 0.5rem;
            box-shadow: 0 10px 18px rgba(15, 23, 42, 0.22);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 0.82rem;
            z-index: 1;
        }

        .product-card .rating-stars {
            display: inline-flex;
            align-items: center;
            gap: 0.08rem;
            color: #fbbf24;
        }

        .product-card .rating-count {
            color: #e5eefb;
            font-weight: 600;
            white-space: nowrap;
        }

        .product-card .card-footer {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.6rem;
            flex-wrap: nowrap;
            padding: 0 1rem 1rem;
        }

        .product-card .product-qty-row {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-wrap: nowrap;
            justify-content: space-between;
        }

        .product-card .product-action-row {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: nowrap;
        }

        .product-card .product-action-row .btn {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            min-height: 38px;
        }

        .product-card .add-cart-cta {
            font-weight: 700;
        }

        /* Mobile filter toggle button (hidden on desktop) */
        .products-filter-toggle {
            display: none;
        }

        .products-search-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
            min-width: 0;
        }

        .filter-sidebar {
            width: 300px;
            flex-shrink: 0;
            position: sticky;
            top: 90px;
            align-self: flex-start;
            max-height: none;
            overflow: visible;
        }

        .filter-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .filter-section {
            margin-bottom: 2rem;
        }

        #product-categories {
            scroll-margin-top: 90px;
        }

        .filter-section:last-child {
            margin-bottom: 0;
        }

        .filter-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .filter-title i {
            font-size: 1rem;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0;
            cursor: pointer;
        }

        .filter-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .filter-option label {
            cursor: pointer;
            flex: 1;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .price-slider-container {
            margin-top: 1rem;
        }

        .price-slider {
            position: relative;
            height: 32px;
            display: flex;
            align-items: center;
        }

        .price-slider input[type=range] {
            position: absolute;
            left: 0;
            right: 0;
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            background: none;
            outline: none;
        }

        .price-slider input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: var(--border-primary);
            border-radius: 999px;
        }

        .price-slider input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 999px;
            background: var(--primary-500);
            border: 3px solid var(--bg-primary);
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            margin-top: -7px;
            cursor: pointer;
        }

        .price-slider input[type=range]::-moz-range-track {
            width: 100%;
            height: 6px;
            background: var(--border-primary);
            border-radius: 999px;
        }

        .price-slider input[type=range]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 999px;
            background: var(--primary-500);
            border: 3px solid var(--bg-primary);
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .price-slider-track {
            position: absolute;
            left: 0;
            right: 0;
            height: 6px;
            border-radius: 999px;
            background: var(--border-primary);
            pointer-events: none;
        }

        .price-slider-fill {
            position: absolute;
            height: 6px;
            border-radius: 999px;
            background: var(--primary-500);
            pointer-events: none;
        }

        .price-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-tertiary);
        }

        .price-current {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-600);
        }

        .products-main {
            flex: 1;
            min-width: 0;
        }

        #products-grid.grid-4 {
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)) !important;
            gap: 1rem !important;
            justify-items: center;
        }

        .product-card {
            width: auto;
            max-width: 100%;
            justify-self: center;
        }

        .product-card .card-content {
            padding: 0.65rem 0.75rem 0.45rem;
        }

        .product-card .card-title {
            font-size: 1rem;
            line-height: 1.2;
            margin-bottom: 0.35rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.35em;
        }

        .product-card .card-description {
            display: none;
        }

        .product-card .product-price {
            font-size: 1rem;
            line-height: 1.2;
            margin-bottom: 0;
            white-space: nowrap;
        }

        .product-card .card-footer {
            gap: 0.35rem;
            padding: 0 0.75rem 0.7rem;
        }

        .product-card .product-qty-row {
            gap: 0.25rem;
        }

        .product-card .product-qty-row label {
            font-size: 0.75rem;
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 2rem;
        }

        .product-card .product-qty-row .form-input {
            width: 54px !important;
            min-width: 54px;
            min-height: 30px;
            padding: 0.2rem 0.3rem;
            font-size: 0.8rem;
        }

        .product-card .product-qty-stepper {
            display: inline-flex;
            align-items: stretch;
            border: 1px solid var(--border-primary);
            border-radius: 999px;
            overflow: hidden;
            background: var(--bg-secondary);
            min-height: 32px;
            width: 96px;
            flex: 0 0 96px;
            box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.12);
        }

        .product-card .product-qty-btn {
            border: none;
            background: transparent;
            color: var(--text-primary);
            width: 30px;
            min-width: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            transition: background-color 0.15s ease;
            flex-shrink: 0;
        }

        .product-card .product-qty-btn:hover {
            background: var(--bg-tertiary);
        }

        .product-card .product-qty-input {
            width: 36px;
            min-width: 36px;
            border: none;
            background: transparent;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-primary);
            padding: 0;
            font-variant-numeric: tabular-nums;
            appearance: textfield;
            -moz-appearance: textfield;
        }

        .product-card .product-qty-input::-webkit-outer-spin-button,
        .product-card .product-qty-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .product-card .product-qty-input:focus {
            outline: none;
        }

        .product-card .card-footer .btn {
            min-height: 32px;
            padding: 0.35rem 0.5rem;
            font-size: 0.8rem;
        }

        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .products-count {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .search-bar {
            flex: 1;
            max-width: 400px;
            min-width: 250px;
        }

        @media (max-width: 1024px) {
            #products-grid.grid-4 {
                grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
            }

            .product-card {
                max-width: 100%;
            }
        }

        @media (max-width: 900px) {
            .mobile-menu-toggle {
                display: none !important;
            }

            .products-layout {
                flex-direction: column;
                gap: 1.25rem;
            }

            /* Turn filters into a left-side slide-in drawer on mobile */
            .filter-sidebar {
                width: 80%;
                max-width: 320px;
                position: fixed;
                top: 62px; /* matches navbar height */
                left: 0;
                height: calc(100vh - 62px - 64px - env(safe-area-inset-bottom, 0px));
                overflow-y: auto;
                z-index: 900;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                background-color: var(--bg-primary);
                box-shadow: 4px 0 24px rgba(0,0,0,0.22);
                padding-bottom: 1rem;
            }

            .filter-sidebar.is-open {
                transform: translateX(0);
            }

            .search-bar {
                max-width: 100%;
            }

            #products-grid.grid-4 {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
            }

            .products-header {
                flex-direction: column;
                align-items: stretch;
            }

            .products-header h2 {
                text-align: center;
            }

            .product-card .card-footer {
                flex-direction: column;
                align-items: stretch;
            }

            .product-card .card-footer .btn,
            .product-card .card-footer input {
                width: 100% !important;
            }

            .product-card .product-action-row {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.35rem;
                width: 100%;
            }

            .product-card .product-action-row .btn {
                width: auto !important;
                min-width: 0;
                padding: 0.35rem 0.35rem;
                font-size: 0.76rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                line-height: 1.1;
            }

            /* Show the Filters button on mobile */
            .products-filter-toggle {
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                flex-shrink: 0;
                white-space: nowrap;
                padding: 0.5rem 1rem;
                width: 100%;
                justify-content: center;
            }

            .products-search-row {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }

            .products-search-row .search-bar,
            .products-search-row #search-input {
                width: 100% !important;
                max-width: 100% !important;
                min-width: 0 !important;
                box-sizing: border-box;
            }
        }

        @media (max-width: 600px) {
            .mobile-menu-toggle {
                display: none !important;
            }

            .products-layout {
                padding: 0 0.5rem;
                margin: 1rem auto;
            }

            .filter-card {
                padding: 1rem;
            }

            #products-grid.grid-4 {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
                gap: 0.75rem !important;
            }

            /* Make product cards more compact on small screens */
            .product-card {
                border-radius: 12px;
            }

            .product-card .card-content {
                padding: 0.5rem 0.75rem 0.75rem;
            }

            .product-card .card-description {
                display: none;
            }

            .product-card .card-title {
                font-size: 0.9rem;
                line-height: 1.25;
            }

            .product-card .product-price {
                font-size: 1rem;
            }

            .product-card .card-footer,
            .product-card .product-card-footer {
                flex-direction: column;
                gap: 0.35rem;
                padding: 0 0.65rem 0.5rem;
                min-height: auto !important;
            }

            /* Hide the separate Qty row to shorten card height */
            .product-card .product-qty-row {
                display: none !important;
            }

            .product-card .card-footer button {
                width: 100%;
                margin-left: 0 !important;
                padding: 0.32rem 0.35rem;
                font-size: 0.78rem;
            }

            .product-card .product-action-row {
                display: grid !important;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.2rem;
                width: 100%;
                justify-items: stretch;
            }

            .product-card .product-action-row .btn {
                width: 100% !important;
                min-width: 0;
                min-height: 36px !important;
                padding: 0.32rem 0.28rem;
                font-size: 0.72rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                line-height: 1.05;
                gap: 0.15rem;
            }

            .product-card .product-action-row .btn i {
                display: none;
            }

            .filter-section {
                margin-bottom: 1.5rem;
            }
        }

        /* account dropdown styles moved to styles.css */
        
    </style>

    <div class="products-layout">
        <!-- Overlay for mobile filter drawer -->
        <div id="filter-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:850;"></div>

        <!-- Filter Sidebar -->
        <aside class="filter-sidebar" id="filter-sidebar">
            <div class="filter-card">
                <!-- Categories -->
                <div class="filter-section" id="product-categories">
                    <div class="filter-title">
                        <i class="fas fa-th-large"></i>
                        Categories
                    </div>
                    <div id="category-checkboxes"></div>
                </div>

                <!-- Price Range -->
                <div class="filter-section">
                    <div class="filter-title">
                        <i class="fas fa-indian-rupee-sign"></i>
                        Price Range
                    </div>
                    <div class="price-slider-container">
                        <div class="price-slider">
                            <div class="price-slider-track"></div>
                            <div class="price-slider-fill" id="price-fill" style="left:0; right:0;"></div>
                            <input type="range" id="price-slider" min="0" max="100" value="100" step="1">
                        </div>
                        <div class="price-labels">
                            <span id="price-min">₹0</span>
                            <span id="price-max">₹5000</span>
                        </div>
                        <div class="price-current" id="price-current">Up to ₹5000</div>
                    </div>
                </div>

                <!-- Sort By -->
                <div class="filter-section">
                    <div class="filter-title">
                        <i class="fas fa-sort"></i>
                        Sort By
                    </div>
                    <select id="sort-by" class="form-select" style="width: 100%;">
                        <option value="popular">Most Popular</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="name">Name: A to Z</option>
                    </select>
                </div>

                <!-- Clear Filters -->
                <button id="clear-filters" class="btn btn-secondary btn-sm" style="width: 100%; margin-top: 1rem; font-size: 0.82rem; padding: 0.4rem 0.75rem;">
                    <i class="fas fa-filter-circle-xmark"></i> Clear All Filters
                </button>
            </div>
        </aside>

        <!-- Products Main -->
        <main class="products-main">
            <div class="products-header">
                <h2 style="margin: 0;">Our Products</h2>
                <div class="products-search-row">
                    <button id="products-filter-toggle" class="btn btn-secondary products-filter-toggle">
                        <i class="fas fa-filter"></i>
                        <span>Filters</span>
                    </button>
                    <input type="text" id="search-input" placeholder="Search products..." class="form-input search-bar" style="flex:1;min-width:0;">
                </div>
            </div>
            <div id="products-count" class="products-count"></div>
            <div id="products-grid" class="grid grid-4" style="margin-top: 1.5rem;">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </main>
    </div>

    <script src="/js/main.js"></script>
    <script>
        let categories = [];
        let allProducts = [];
        let products = [];
        let currentPriceRange = null;
        let selectedCategories = new Set();

        async function loadCategories() {
            const data = await api.get('/products/categories');
            categories = data.categories;
            renderCategoryCheckboxes();
        }

        function renderCategoryCheckboxes() {
            const container = document.getElementById('category-checkboxes');
            if (!container) return;

            container.innerHTML = categories.map(cat => `
                <div class="filter-option">
                    <input type="checkbox" id="cat-${cat.id}" value="${cat.id}" onchange="toggleCategory(${cat.id})">
                    <label for="cat-${cat.id}">${cat.name}</label>
                </div>
            `).join('');
        }

        function toggleCategory(categoryId) {
            if (selectedCategories.has(categoryId)) {
                selectedCategories.delete(categoryId);
            } else {
                selectedCategories.add(categoryId);
            }
            applyFilters();
        }

        async function loadProducts() {
            const data = await api.get('/products');
            allProducts = data.products || [];

            // Compute price range on client if not provided or as a fallback
            // Use effective selling price (discount_price if available and lower, else regular price)
            if (allProducts.length > 0) {
                const prices = allProducts
                    .map(p => {
                        const base = p.price != null ? parseFloat(p.price) : null;
                        const discount = p.discount_price != null ? parseFloat(p.discount_price) : null;
                        // Use discount if available and lower than base price
                        if (discount != null && base != null && discount < base) {
                            return discount;
                        }
                        return base;
                    })
                    .filter(v => Number.isFinite(v));

                if (prices.length > 0) {
                    currentPriceRange = {
                        min: Math.min(...prices),
                        max: Math.max(...prices)
                    };
                }
            }

            updatePriceSliderBounds();
            updatePriceLabels();
            applyFilters();
        }

        function sortProducts(sortBy) {
            switch(sortBy) {
                case 'price-low':
                    products.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
                    break;
                case 'price-high':
                    products.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
                    break;
                case 'name':
                    products.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'popular':
                default:
                    // Keep default order from original list
                    break;
            }
        }

        function updatePriceSliderBounds(currentMaxPrice = null) {
            const slider = document.getElementById('price-slider');
            if (!slider) return;

            if (currentPriceRange && Number.isFinite(currentPriceRange.min) && Number.isFinite(currentPriceRange.max)) {
                const min = Math.floor(currentPriceRange.min);
                const max = Math.ceil(currentPriceRange.max);

                slider.min = String(min);
                slider.max = String(max);

                // If we have a current filter max, keep slider at that value, otherwise at full range
                if (currentMaxPrice !== null && Number.isFinite(currentMaxPrice)) {
                    slider.value = String(currentMaxPrice);
                } else {
                    slider.value = String(max);
                }
            }
        }

        function updatePriceLabels() {
            const minLabel = document.getElementById('price-min');
            const maxLabel = document.getElementById('price-max');
            const currentLabel = document.getElementById('price-current');
            const slider = document.getElementById('price-slider');

            if (!minLabel || !maxLabel || !slider) return;

            const min = Number(slider.min || 0);
            const max = Number(slider.max || 0);
            const value = Number(slider.value || max);

            minLabel.textContent = formatCurrency(min);
            maxLabel.textContent = formatCurrency(max);

            if (currentLabel) {
                currentLabel.textContent = `Up to ${formatCurrency(value)}`;
            }
        }

        function updatePriceSliderUI() {
            const slider = document.getElementById('price-slider');
            const filled = document.getElementById('price-fill');
            const currentLabel = document.getElementById('price-current');

            if (!slider || !filled) return;

            const min = Number(slider.min || 0);
            const max = Number(slider.max || 0);
            const value = Number(slider.value || max);

            let percent = 100;
            if (max > min) {
                percent = ((value - min) / (max - min)) * 100;
            }

            percent = Math.max(0, Math.min(100, percent));

            filled.style.left = '0%';
            filled.style.right = `${100 - percent}%`;

            if (currentLabel) {
                currentLabel.textContent = `Up to ${formatCurrency(value)}`;
            }
        }

        function updateProductsCount() {
            const countEl = document.getElementById('products-count');
            if (countEl) {
                const count = products.length;
                countEl.textContent = `Showing ${count} product${count !== 1 ? 's' : ''}`;
            }
        }

        function renderStars(value, size = '0.95rem') {
            const safeValue = Math.max(0, Math.min(5, Number(value) || 0));
            const full = Math.floor(safeValue);
            const hasHalf = safeValue - full >= 0.5;
            const stars = [];

            for (let i = 0; i < 5; i += 1) {
                if (i < full) {
                    stars.push(`<span style="color:#f59e0b;font-size:${size};">★</span>`);
                } else if (i === full && hasHalf) {
                    stars.push(`<span style="color:#f59e0b;font-size:${size};">★</span>`);
                } else {
                    stars.push(`<span style="color:#cbd5e1;font-size:${size};">☆</span>`);
                }
            }

            return stars.join('');
        }

        function getRatingText(averageRating, ratingCount) {
            const safeAverage = Math.max(0, Math.min(5, Number(averageRating) || 0));
            const safeCount = Number.isFinite(Number(ratingCount)) ? Math.max(0, Number(ratingCount)) : 0;
            if (!safeCount) return 'No ratings yet';
            return `${safeAverage.toFixed(1)}/5 • ${safeCount} rating${safeCount === 1 ? '' : 's'}`;
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            if (products.length === 0) {
                grid.innerHTML = '<p class="text-center">No products found</p>';
                return;
            }
            
            grid.innerHTML = products.map(p => `
                <div class="card product-card">
                    <div class="card-image-wrap">
                        <img src="${p.image_url || '/images/placeholder.jpg'}" alt="${p.name}" class="card-image" loading="lazy" decoding="async" onclick="window.location.href='/product-details?id=${encodeURIComponent(p.id)}'" onload="this.classList.add('loaded')" onerror="this.onerror=null; this.src='/images/placeholder.jpg'; this.classList.add('loaded');">
                    </div>
                    <div class="card-body">
                        <a href="/product-details?id=${p.id}" class="product-card-link">
                            <div class="card-content">
                                <h3 class="card-title">${p.name}</h3>
                                <p class="card-description">${p.description || ''}</p>
                                <div style="display:flex; align-items:center; gap:0.35rem; flex-wrap:wrap; margin-top:0.35rem; color:var(--text-secondary); font-size:0.88rem;">
                                    <span style="display:flex; align-items:center; gap:0.1rem;">${renderStars(p.average_rating || 0, '0.9rem')}</span>
                                    <span>${getRatingText(p.average_rating || 0, p.rating_count || 0)}</span>
                                </div>
                                ${(() => {
                                    const useWholesale = auth.isWholesale() && p.wholesale_price;
                                    const base = parseFloat(p.price || 0);
                                    const discount = p.discount_price != null ? parseFloat(p.discount_price) : null;
                                    const retail = discount != null && discount < base ? discount : base;
                                    const sale = useWholesale ? parseFloat(p.wholesale_price) : retail;
                                    const showDiscount = !useWholesale && discount != null && discount < base;
                                    if (showDiscount) {
                                        return `<div class="product-price"><span class="price-original">${formatCurrency(base)}</span> <span class="price-discount">${formatCurrency(sale)}</span></div>`;
                                    }
                                    return `<div class="product-price">${formatCurrency(sale)}</div>`;
                                })()}
                            </div>
                        </a>
                        <div class="card-footer product-card-footer" style="display:flex; align-items:center; gap:0.25rem; flex-wrap:wrap;">
                            <div class="product-action-row" style="width:100%;">
                                <button class="btn btn-primary btn-sm add-cart-cta" onclick="addToCart(${p.id})" ${(p.stock_quantity || 0) <= 0 ? 'disabled' : ''}>
                                    <i class="fas fa-cart-plus"></i> ${(p.stock_quantity || 0) <= 0 ? 'Out of Stock' : 'Add to Cart'}
                                </button>
                                <button class="btn btn-success btn-sm" onclick="buyNow(${p.id})" ${(p.stock_quantity || 0) <= 0 ? 'disabled' : ''}>
                                    <i class="fas fa-credit-card"></i> Buy Now
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            if (window.optimizeDynamicImages) {
                window.optimizeDynamicImages(grid);
            }

            // After rendering, apply wholesale-specific quantity rules
            applyWholesaleQuantityRules();
        }

        function normalizeProductQuantity(productId, value) {
            const input = document.getElementById(`product-qty-${productId}`);
            if (!input) return;

            const min = parseInt(input.min, 10) || 1;
            const max = parseInt(input.max, 10);
            let qty = parseInt(value, 10);

            if (!Number.isFinite(qty) || qty < min) qty = min;
            if (Number.isFinite(max) && max > 0 && qty > max) qty = max;

            input.value = String(qty);
        }

        function updateProductQuantity(productId, delta) {
            const input = document.getElementById(`product-qty-${productId}`);
            if (!input) return;

            const min = parseInt(input.min, 10) || 1;
            const max = parseInt(input.max, 10);
            const current = parseInt(input.value, 10);
            let qty = Number.isFinite(current) ? current : min;

            qty = Math.max(min, qty + delta);
            if (Number.isFinite(max) && max > 0) {
                qty = Math.min(qty, max);
            }

            input.value = String(qty);
        }

        function getProductQuantity(productId) {
            const input = document.getElementById(`product-qty-${productId}`);
            if (!input) return 1;

            normalizeProductQuantity(productId, input.value);
            const val = parseInt(input.value, 10);
            if (isNaN(val) || val < 1) return 1;
            return val;
        }

        function applyWholesaleQuantityRules() {
            // Only adjust if current user is wholesale
            if (!auth.isWholesale || !auth.isWholesale()) return;

            products.forEach(p => {
                const input = document.getElementById(`product-qty-${p.id}`);
                const label = document.querySelector(`label[for="product-qty-${p.id}"]`);
                if (!input) return;

                const minRaw = Number(p.min_wholesale_qty);
                const minQty = Number.isFinite(minRaw) && minRaw > 0 ? minRaw : 1;

                input.min = String(minQty);
                input.step = String(minQty);
                if (!input.value || Number(input.value) < minQty) {
                    input.value = String(minQty);
                }

                if (label && minQty > 1) {
                    label.textContent = `Qty (min ${minQty})`;
                }
            });
        }

        async function addToCart(productId) {
            try {
                const quantity = getProductQuantity(productId);
                await cart.add(productId, quantity);
            } catch (err) {
                console.error('Add to cart error:', err);
                if (!auth.isAuthenticated()) {
                    showAlert('Please login to add items to cart', 'error');
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    showAlert('Failed to add product to cart', 'error');
                }
            }
        }

        async function buyNow(productId) {
            try {
                const user = await auth.checkAuth();

                if (!user) {
                    showAlert('Please login to buy products', 'error');
                    setTimeout(() => {
                        window.location.href = `/login?redirect=/products`;
                    }, 1500);
                    return;
                }

                // Find product from already-loaded list
                const product = allProducts.find(p => p.id === productId);
                if (!product) {
                    // Fallback: product not in list yet, go to product details
                    window.location.href = `/product-details?id=${productId}`;
                    return;
                }

                if ((product.stock_quantity || 0) <= 0) {
                    showAlert('This product is out of stock.', 'error');
                    return;
                }

                const basePrice = parseFloat(product.price || 0);
                const discountPrice = product.discount_price != null ? parseFloat(product.discount_price) : null;
                const sellingPrice = (discountPrice !== null && discountPrice < basePrice) ? discountPrice : basePrice;
                const quantity = getProductQuantity(productId);

                try {
                    await cart.add(product.id, quantity);
                    window.location.href = '/checkout';
                } catch (err) {
                    console.error('Buy now error:', err);
                    showAlert(err.message || 'Failed to start checkout', 'error');
                }
            } catch (err) {
                console.error('Buy now error:', err);
                showAlert(err.message || 'Failed to start checkout', 'error');
            }
        }

        function applyFilters() {
            if (!allProducts || allProducts.length === 0) {
                products = [];
                renderProducts();
                updateProductsCount();
                return;
            }

            const search = document.getElementById('search-input')?.value.trim().toLowerCase() || '';
            const slider = document.getElementById('price-slider');
            const sortBy = document.getElementById('sort-by')?.value || 'popular';

            let filtered = [...allProducts];

            // Category filter (multi-select)
            if (selectedCategories.size > 0) {
                filtered = filtered.filter(p => selectedCategories.has(p.category_id));
            }

            // Search filter
            if (search) {
                filtered = filtered.filter(p => {
                    const name = (p.name || '').toLowerCase();
                    const desc = (p.description || '').toLowerCase();
                    const barcode = (p.barcode || '').toLowerCase();
                    return name.includes(search) || desc.includes(search) || barcode.includes(search);
                });
            }

            // Price filter - use effective selling price (discount if available and lower)
            if (slider) {
                const min = Number(slider.min || 0);
                const max = Number(slider.max || 0);
                const value = Number(slider.value || max);

                if (max > min && value < max) {
                    filtered = filtered.filter(p => {
                        const base = p.price != null ? parseFloat(p.price) : null;
                        const discount = p.discount_price != null ? parseFloat(p.discount_price) : null;
                        // Use discount if available and lower than base price
                        let effectivePrice;
                        if (discount != null && base != null && discount < base) {
                            effectivePrice = discount;
                        } else {
                            effectivePrice = base;
                        }
                        return Number.isFinite(effectivePrice) && effectivePrice <= value;
                    });
                }
            }

            products = filtered;

            // Apply sorting on the filtered list
            sortProducts(sortBy);

            updateProductsCount();
            renderProducts();
        }

        function clearFilters() {
            // Clear category checkboxes
            selectedCategories.clear();
            const checkboxes = document.querySelectorAll('#category-checkboxes input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = false);

            // Clear search
            const searchInput = document.getElementById('search-input');
            if (searchInput) searchInput.value = '';

            // Reset price slider to full range
            const slider = document.getElementById('price-slider');
            if (slider) {
                slider.value = slider.max || slider.value;
            }

            // Reset sort
            const sortBy = document.getElementById('sort-by');
            if (sortBy) sortBy.value = 'popular';

            // Update UI and re-apply filters on the full list
            updatePriceLabels();
            updatePriceSliderUI();
            applyFilters();
        }

        function formatCurrency(value) {
            return `₹${parseFloat(value).toFixed(2)}`;
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Products page loading...');
            await auth.checkAuth();
            console.log('Auth checked, current user:', auth.currentUser);
            await cart.fetch();
            console.log('Cart loaded');
            await loadCategories();
            await loadProducts();

            // Pre-select category and search from URL params
            const urlParams = new URLSearchParams(window.location.search);
            const urlCategoryId = parseInt(urlParams.get('category'), 10);
            const urlSearchQuery = String(urlParams.get('search') || '').trim();

            if (urlCategoryId) {
                const cb = document.getElementById(`cat-${urlCategoryId}`);
                if (cb) {
                    cb.checked = true;
                    selectedCategories.add(urlCategoryId);
                }
            }

            if (urlSearchQuery) {
                const searchInput = document.getElementById('search-input');
                if (searchInput) {
                    searchInput.value = urlSearchQuery;
                }
            }

            // Wire up slider (dynamic filtering on drag)
            const slider = document.getElementById('price-slider');
            if (slider) {
                slider.addEventListener('input', () => {
                    updatePriceSliderUI();
                    applyFilters();
                });
            }

            // Wire up sort dropdown
            const sortBy = document.getElementById('sort-by');
            if (sortBy) {
                sortBy.addEventListener('change', () => {
                    applyFilters();
                });
            }

            // Wire up search
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('input', debounce(() => {
                    applyFilters();
                }, 500));
            }

            // Wire up clear filters button
            const clearBtn = document.getElementById('clear-filters');
            if (clearBtn) {
                clearBtn.addEventListener('click', clearFilters);
            }

            // Account dropdown toggle
            const accountToggle = document.getElementById('account-toggle');
            const accountDropdown = document.getElementById('account-dropdown');

            if (accountToggle && accountDropdown) {
                accountToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    accountDropdown.classList.toggle('hidden');
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.account-menu')) {
                        accountDropdown.classList.add('hidden');
                    }
                });
            }

            // Automatically apply initial filters after reconciling URL params
            if (urlCategoryId || urlSearchQuery) {
                applyFilters();
            }

            // Account logout handler
            const accountLogout = document.getElementById('account-logout');
            if (accountLogout) {
                accountLogout.addEventListener('click', async () => {
                    if (await showConfirmDialog('Are you sure you want to logout?', { title: 'Logout', confirmText: 'Logout' })) {
                        await auth.logout();
                    }
                });
            }

            // Mobile filters toggle (left-side drawer)
            const filterToggleBtn = document.getElementById('products-filter-toggle');
            const filterSidebar = document.getElementById('filter-sidebar');
            const filterOverlay = document.getElementById('filter-overlay');
            const navCategoriesLink = document.getElementById('nav-categories-link');
            const productCategoriesSection = document.getElementById('product-categories');

            function openFilters() {
                if (filterSidebar) filterSidebar.classList.add('is-open');
                if (filterOverlay) filterOverlay.style.display = 'block';
            }

            function closeFilters() {
                if (filterSidebar) filterSidebar.classList.remove('is-open');
                if (filterOverlay) filterOverlay.style.display = 'none';
            }

            if (filterToggleBtn && filterSidebar) {
                filterToggleBtn.addEventListener('click', () => {
                    if (filterSidebar.classList.contains('is-open')) {
                        closeFilters();
                    } else {
                        openFilters();
                    }
                });
            }

            if (filterOverlay) {
                filterOverlay.addEventListener('click', closeFilters);
            }

            if (navCategoriesLink && productCategoriesSection) {
                navCategoriesLink.addEventListener('click', (event) => {
                    event.preventDefault();

                    const isMobileView = window.matchMedia('(max-width: 900px)').matches;
                    if (isMobileView) {
                        openFilters();
                    }

                    productCategoriesSection.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                });
            }
        });
    </script>
</body>
</html>
