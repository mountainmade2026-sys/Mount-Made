<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/mobile-enhancements.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .product-detail-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        
        @media (max-width: 768px) {
            .product-detail-container {
                margin: 1rem auto;
                padding: 0 1rem;
            }
        }
        
        @media (max-width: 480px) {
            .product-detail-container {
                margin: 0.5rem auto;
                padding: 0 0.75rem;
            }
        }
        
        .product-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-bottom: 2rem;
            align-items: start;
        }

        .product-info-section {
            min-width: 0;
        }
        
        @media (max-width: 968px) {
            .product-detail-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .product-info-section {
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .product-detail-grid {
                gap: 1rem;
                margin-bottom: 1rem;
            }

            .product-info-section {
                width: 100%;
                overflow-wrap: anywhere;
            }
        }
        
        .product-image-section {
            position: static;
            height: fit-content;
        }
        
        .product-main-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-primary);
            box-shadow: var(--shadow-md);
            cursor: zoom-in;
        }
        
        @media (max-width: 768px) {
            .product-main-image {
                border-radius: 8px;
            }
        }
        
        @media (max-width: 480px) {
            .product-main-image {
                margin-bottom: 0.75rem;
            }
        }
        
        .product-thumbnails {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }
        
        @media (max-width: 480px) {
            .product-thumbnails {
                gap: 0.5rem;
            }
        }
        
        .product-thumbnail {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid var(--border-primary);
            transition: border-color 0.2s;
        }
        
        @media (max-width: 480px) {
            .product-thumbnail {
                border-radius: 6px;
            }
        }
        
        .product-thumbnail:hover,
        .product-thumbnail.active {
            border-color: var(--primary-500);
        }

        .image-lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            z-index: 2200;
        }

        .image-lightbox.hidden {
            display: none;
        }

        .image-lightbox img {
            max-width: min(96vw, 1400px);
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.55);
        }

        .image-lightbox-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 42px;
            height: 42px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .image-lightbox-close:hover {
            background: rgba(0, 0, 0, 0.7);
        }
        
        .product-info-section h1 {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .product-title-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .product-share {
            position: relative;
            flex: 0 0 auto;
        }

        .product-share-btn {
            width: 42px;
            height: 42px;
            border-radius: 999px;
            border: 1px solid var(--border-primary);
            background: var(--bg-secondary);
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .product-share-btn:hover {
            background: var(--bg-tertiary);
        }

        .product-share-menu {
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            min-width: 220px;
            background: var(--bg-primary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
            padding: 0.5rem;
            z-index: 50;
        }

        .product-share-menu button {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 0.6rem;
            padding: 0.65rem 0.75rem;
            border: 0;
            border-radius: 10px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
        }

        .product-share-menu button:hover {
            background: var(--bg-secondary);
        }

        .product-share-hint {
            font-size: 0.8rem;
            color: var(--text-secondary);
            padding: 0.25rem 0.75rem 0.5rem;
        }
        
        @media (max-width: 768px) {
            .product-info-section h1 {
                font-size: 1.5rem;
                margin-bottom: 0.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .product-info-section h1 {
                font-size: 1.25rem;
                line-height: 1.4;
            }
        }
        
        .product-rating {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-primary);
            color: var(--warning);
        }
        
        @media (max-width: 768px) {
            .product-rating {
                margin-bottom: 1rem;
                padding-bottom: 1rem;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .product-rating {
                gap: 0.35rem;
                font-size: 0.85rem;
            }
        }
        
        .product-price-section {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 10px;
            margin: 1.5rem 0;
            border: 1px solid var(--border-primary);
        }
        
        @media (max-width: 768px) {
            .product-price-section {
                padding: 1.25rem;
                margin: 1rem 0;
            }
        }
        
        @media (max-width: 480px) {
            .product-price-section {
                padding: 1rem;
                border-radius: 8px;
            }
        }
        
        .product-price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-600);
            margin-bottom: 0.5rem;
        }

        .product-total-price {
            margin-top: 0.45rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            min-height: 1.2em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        @media (max-width: 768px) {
            .product-price {
                font-size: 1.75rem;
            }
        }
        
        @media (max-width: 480px) {
            .product-price {
                font-size: 1.5rem;
            }
        }
        
        .product-stock {
            background: var(--success-bg);
            color: var(--text-primary);
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            display: inline-block;
            margin: 1rem 0;
            border: 1px solid rgba(16, 185, 129, 0.35);
            animation: productStockGlowGreen 1.8s ease-in-out infinite;
        }
        
        @media (max-width: 480px) {
            .product-stock {
                padding: 0.4rem 0.85rem;
                font-size: 0.9rem;
            }
        }
        
        .product-stock.low {
            background: var(--warning-bg);
            color: var(--text-primary);
            border-color: rgba(245, 158, 11, 0.45);
            animation: productStockGlowAmber 1.8s ease-in-out infinite;
        }
        
        .product-stock.out {
            background: var(--error-bg);
            color: var(--text-primary);
            border-color: rgba(239, 68, 68, 0.48);
            animation: productStockGlowRed 1.8s ease-in-out infinite;
        }

        @keyframes productStockGlowGreen {
            0%, 100% { box-shadow: 0 0 0 rgba(16, 185, 129, 0); }
            50% { box-shadow: 0 0 14px rgba(16, 185, 129, 0.45); }
        }

        @keyframes productStockGlowAmber {
            0%, 100% { box-shadow: 0 0 0 rgba(245, 158, 11, 0); }
            50% { box-shadow: 0 0 14px rgba(245, 158, 11, 0.42); }
        }

        @keyframes productStockGlowRed {
            0%, 100% { box-shadow: 0 0 0 rgba(239, 68, 68, 0); }
            50% { box-shadow: 0 0 14px rgba(239, 68, 68, 0.45); }
        }
        
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
            width: 100%;
            box-sizing: border-box;
        }
        
        @media (max-width: 768px) {
            .quantity-selector {
                margin: 1rem 0;
            }
        }
        
        @media (max-width: 480px) {
            .quantity-selector {
                gap: 0.75rem;
                font-size: 0.9rem;
            }
        }
        
        .product-actions {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
            width: 100%;
            box-sizing: border-box;
        }
        
        @media (max-width: 768px) {
            .product-actions {
                margin: 1rem 0;
            }
        }
        
        @media (max-width: 640px) {
            .quantity-selector {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
                width: 100%;
            }

            .quantity-controls {
                width: 100%;
                max-width: 100%;
                border-radius: 12px;
                box-sizing: border-box;
            }

            .product-actions {
                flex-direction: column;
                gap: 0.75rem;
                width: 100%;
            }

            .product-actions .btn {
                width: 100%;
                min-width: 0;
                white-space: normal;
            }
        }
        
        .quantity-selector label {
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .quantity-controls {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--border-primary);
            border-radius: 999px;
            background: var(--bg-secondary);
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.12);
            flex-wrap: nowrap;
            min-width: 0;
            max-width: 100%;
            width: auto;
        }
        
        .quantity-controls button {
            padding: 0.35rem 0.75rem;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            color: var(--text-primary);
            transition: background 0.2s, color 0.2s;
            min-width: 40px;
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        @media (max-width: 480px) {
            .quantity-selector {
                width: 100%;
            }

            .quantity-controls {
                width: 100%;
                max-width: 100%;
                border-radius: 12px;
                box-sizing: border-box;
            }

            .quantity-controls button {
                padding: 0.45rem 0.8rem;
                font-size: 1.05rem;
                min-width: 44px;
                min-height: 44px;
            }

            .quantity-controls input {
                flex: 1 1 auto;
                min-width: 0;
                width: auto;
            }
        }
        
        .quantity-controls button:hover {
            background: var(--bg-tertiary);
        }
        
        .quantity-controls input {
            width: 54px;
            min-width: 54px;
            text-align: center;
            border: none;
            padding: 0.25rem 0.15rem;
            font-size: 0.98rem;
            line-height: 1.2;
            background: transparent;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .quantity-controls input::-webkit-outer-spin-button,
        .quantity-controls input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        @media (max-width: 480px) {
            .quantity-controls input {
                width: 50px;
                padding: 0.4rem;
                font-size: 0.95rem;
            }
        }
        
        .product-actions {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        
        .product-actions .btn {
            flex: 1;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
        }
        
        @media (max-width: 480px) {
            .product-actions .btn {
                padding: 0.85rem;
                font-size: 0.95rem;
            }
        }
        
        .product-description {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-primary);
        }
        
        @media (max-width: 768px) {
            .product-description {
                margin-top: 1.5rem;
                padding-top: 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .product-description {
                margin-top: 1rem;
                padding-top: 1rem;
                font-size: 0.9rem;
            }
        }
        
        .product-description h3 {
            margin-bottom: 1rem;
            font-size: 1.25rem;
        }

        .related-products-section {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-primary);
        }

        .related-products-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .related-products-header h3 {
            margin: 0;
            font-size: 1.15rem;
        }

        .related-products-header p {
            margin: 0.15rem 0 0;
            color: var(--text-secondary);
            font-size: 0.92rem;
        }

        .related-products-nav {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-shrink: 0;
        }

        .related-products-nav button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: 1px solid var(--border-primary);
            border-radius: 999px;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .related-products-nav button:hover {
            transform: translateY(-1px);
            border-color: var(--primary-500);
            background: var(--bg-secondary);
        }

        .related-products-nav button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .related-products-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.35rem;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0.2rem 0.1rem 0.55rem;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scroll-behavior: smooth;
        }

        .related-product-card {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            flex: 0 0 180px;
            min-width: 180px;
            padding: 0.85rem;
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            background: var(--bg-primary);
            box-shadow: var(--shadow-sm);
            transition: transform 0.15s ease, border-color 0.15s ease;
            scroll-snap-align: start;
        }

        .related-product-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary-500);
        }

        .related-product-card img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border-radius: 10px;
            background: var(--bg-secondary);
        }

        .related-product-card h4 {
            margin: 0;
            font-size: 0.98rem;
            line-height: 1.3;
            color: var(--text-primary);
        }

        .related-product-card p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.88rem;
        }

        .related-product-card .price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .related-product-card .view-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            text-decoration: none;
            color: var(--primary-600);
            font-weight: 600;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .related-product-card {
                flex-basis: 170px;
                min-width: 170px;
            }
        }

        @media (max-width: 640px) {
            .related-products-section {
                margin-top: 1rem;
                padding-top: 0.75rem;
            }

            .related-products-header {
                align-items: flex-start;
                flex-direction: column;
                gap: 0.45rem;
            }

            .related-products-header h3 {
                font-size: 1rem;
            }

            .related-products-header p {
                font-size: 0.85rem;
            }

            .related-products-nav {
                align-self: flex-end;
            }

            .related-products-row {
                gap: 0.6rem;
                padding: 0.15rem 0.05rem 0.45rem;
            }

            .related-product-card {
                flex: 0 0 74vw;
                min-width: 74vw;
                padding: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .related-products-row {
                gap: 0.55rem;
            }

            .related-product-card {
                flex: 0 0 78vw;
                min-width: 78vw;
                padding: 0.7rem;
            }

            .related-product-card h4 {
                font-size: 0.92rem;
            }

            .related-product-card p {
                font-size: 0.82rem;
            }
        }
        
        @media (max-width: 768px) {
            .product-description h3 {
                font-size: 1.15rem;
            }
        }
        
        @media (max-width: 480px) {
            .product-description h3 {
                font-size: 1.05rem;
                margin-bottom: 0.75rem;
            }
        }
        
        .product-specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        @media (max-width: 768px) {
            .product-specs {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }
        }
        
        @media (max-width: 480px) {
            .product-specs {
                gap: 0.5rem;
                margin-top: 1rem;
            }
        }
        
        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border-radius: 6px;
            border: 1px solid var(--border-primary);
        }
        
        @media (max-width: 480px) {
            .spec-item {
                padding: 0.65rem;
                font-size: 0.9rem;
            }
        }
        
        .spec-label {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .spec-value {
            color: var(--text-secondary);
        }
        
        .delivery-info {
            background: var(--success-bg);
            padding: 1.5rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            border-left: 4px solid var(--success);
        }
        
        @media (max-width: 768px) {
            .delivery-info {
                padding: 1.25rem;
                margin: 1rem 0;
            }
        }
        
        @media (max-width: 480px) {
            .delivery-info {
                padding: 1rem;
                font-size: 0.9rem;
            }
        }
        
        .delivery-info h4 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-size: 1.05rem;
        }
        
        @media (max-width: 480px) {
            .delivery-info h4 {
                font-size: 1rem;
            }
        }
        
        .delivery-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.5rem 0;
            color: var(--text-primary);
        }
        
        @media (max-width: 480px) {
            .delivery-option {
                gap: 0.4rem;
                font-size: 0.9rem;
            }
        }

        /* Address selection modal styling (make clearly visible) */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1050;
            padding: 1.25rem;
        }

        .modal-content {
            background: var(--bg-primary);
            padding: 1.75rem 1.5rem 1.75rem;
            border-radius: 12px;
            width: 100%;
            max-width: 640px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-2xl);
            border: 1px solid var(--border-primary);
        }
        
        @media (max-width: 768px) {
            .modal-content {
                padding: 1.5rem 1.25rem;
            }
        }
        
        @media (max-width: 480px) {
            .modal-content {
                padding: 1.25rem 1rem;
                border-radius: 10px;
                max-height: 85vh;
            }
        }

        .modal-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .modal-header-row h3 {
            margin: 0;
            font-size: 1.4rem;
        }
        
        @media (max-width: 480px) {
            .modal-header-row h3 {
                font-size: 1.2rem;
            }
        }

        .modal-close-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0.25rem;
            border-radius: 999px;
        }

        .modal-close-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .address-option {
            background: var(--bg-secondary);
        }
        
        /* account dropdown styles moved to styles.css */

        /* ── Dark mode overrides ── */
        html[data-theme="dark"] .product-main-image,

    <script src="/js/main.js"></script>
    <script>
        let product = null;
        let selectedQuantity = 1;
        let userAddresses = [];
        let quickCodPincodes = []; // loaded from site settings for delivery/COD availability checks

        function getQuantityStep() {
            const isWholesaleUser = !!(auth && typeof auth.isWholesale === 'function' && auth.isWholesale());
            if (!isWholesaleUser) return 1;
            const raw = parseInt((product && product.min_wholesale_qty) || 10, 10);
            return Number.isFinite(raw) && raw > 0 ? raw : 10;
        }

        function getCurrentPricing() {
            if (!product) return { basePrice: 0, salePrice: 0, showDiscount: false, isWholesale: false };

            const isWholesale = auth.isWholesale();
            const basePrice = parseFloat(product.price || 0);
            const discount = product.discount_price != null ? parseFloat(product.discount_price) : null;
            const retailPrice = discount != null && discount < basePrice ? discount : basePrice;
            const salePrice = isWholesale && product.wholesale_price ? parseFloat(product.wholesale_price) : retailPrice;
            const showDiscount = !isWholesale && discount != null && discount < basePrice;

            return { basePrice, salePrice, showDiscount, isWholesale };
        }

        function normalizeWeightUnit(unit) {
            const normalized = String(unit || '').trim().toLowerCase();
            if (['g', 'grams', 'gm', 'gram'].includes(normalized)) return 'g';
            if (['kg', 'kilogram', 'kilograms', 'kilo', 'kilo gram'].includes(normalized)) return 'kg';
            return 'g';
        }

        function getWeightInGrams(value, unit) {
            const amount = Number.parseFloat(value);
            if (!Number.isFinite(amount) || amount <= 0) return 0;
            const normalizedUnit = normalizeWeightUnit(unit);
            return normalizedUnit === 'kg' ? amount * 1000 : amount;
        }

        function getBaseWeightInGrams(productData) {
            const rawWeight = Number.parseFloat(productData?.weight || 0);
            if (!Number.isFinite(rawWeight) || rawWeight <= 0) return 0;
            return getWeightInGrams(rawWeight, productData?.weight_unit || productData?.unit || 'g');
        }

        function getWeightMultiplierForSelection(productData, selection) {
            const baseWeightInGrams = getBaseWeightInGrams(productData);
            if (baseWeightInGrams <= 0) return 1;

            if (!selection || selection?.value == null) {
                return 1;
            }

            const selectedWeight = getWeightInGrams(selection.value, selection.unit || productData?.weight_unit || productData?.unit || 'g');
            return selectedWeight > 0 ? selectedWeight / baseWeightInGrams : 1;
        }

        function getSelectedWeightInGrams(selection, fallbackProduct = product) {
            if (!selection || selection.value == null) {
                return 0;
            }

            return getWeightInGrams(selection.value, selection.unit || fallbackProduct?.weight_unit || fallbackProduct?.unit || 'g');
        }

        function getMaxWeightAmount(productData) {
            const baseWeightInGrams = getBaseWeightInGrams(productData);
            const rawStock = Number.parseFloat(productData?.stock_quantity || 0);
            if (!Number.isFinite(rawStock) || rawStock <= 0 || baseWeightInGrams <= 0) return 0;

            return baseWeightInGrams * rawStock;
        }

        function getMaxAllowedWeightPerItem(productData, quantity = selectedQuantity) {
            const totalAvailableWeight = getMaxWeightAmount(productData);
            const qty = Number(quantity) > 0 ? Number(quantity) : 1;
            if (totalAvailableWeight <= 0 || !Number.isFinite(qty) || qty <= 0) return 0;

            const perItemWeight = totalAvailableWeight / qty;
            const maxSupportedWeight = 50000;
            return Math.min(perItemWeight, maxSupportedWeight);
        }

        function clampManualWeightSelectionForCurrentQuantity() {
            const manualSelection = getManualWeightSelection();
            if (!manualSelection) return false;

            const maxAllowedWeight = getMaxAllowedWeightPerItem(product, selectedQuantity);
            if (maxAllowedWeight <= 0) return false;

            const selectedGrams = getWeightInGrams(manualSelection.value, manualSelection.unit || product?.weight_unit || product?.unit || 'g');
            if (selectedGrams <= maxAllowedWeight) return false;

            const unit = normalizeWeightUnit(manualSelection.unit || product?.weight_unit || product?.unit || 'g');
            const safeValue = unit === 'kg' ? maxAllowedWeight / 1000 : maxAllowedWeight;
            const weightInput = document.getElementById('custom-weight-value');
            if (weightInput) weightInput.value = safeValue;

            selectedWeightOption = {
                value: safeValue,
                label: formatWeightLabel(maxAllowedWeight, manualSelection.unit || product?.weight_unit || product?.unit || 'g'),
                unit: manualSelection.unit || product?.weight_unit || product?.unit || 'g'
            };

            if (typeof showAlert === 'function') {
                showAlert('The entered weight was reduced to the amount available for this quantity.', 'info');
            }

            return true;
        }

        function showAddToCartSuccess() {
            const successEl = document.getElementById('add-to-cart-success');
            if (successEl) {
                successEl.style.display = 'flex';
                successEl.classList.remove('hidden');
            }
        }

        function hideAddToCartSuccess() {
            const successEl = document.getElementById('add-to-cart-success');
            if (successEl) {
                successEl.style.display = 'none';
                successEl.classList.add('hidden');
            }
        }

        function updateDisplayedPrice() {
            const pricing = getCurrentPricing();
            const qty = Number(selectedQuantity) > 0 ? Number(selectedQuantity) : 1;
            const selectedWeight = product?.is_weight_based ? getSelectedWeightForOrder() : null;
            const weightMultiplier = product?.is_weight_based && selectedWeight ? getWeightMultiplierForSelection(product, selectedWeight) : 1;
            const effectiveSalePrice = pricing.salePrice * weightMultiplier;
            const effectiveBasePrice = pricing.basePrice * weightMultiplier;

            const salePriceEl = document.getElementById('product-sale-price');
            const basePriceEl = document.getElementById('product-base-price');
            const totalPriceEl = document.getElementById('product-total-price');
            const perUnitHintEl = document.getElementById('product-price-hint');

            const saleTotal = effectiveSalePrice * qty;
            const baseTotal = effectiveBasePrice * qty;

            if (salePriceEl) {
                salePriceEl.textContent = formatCurrency(saleTotal);
            }

            if (basePriceEl) {
                if (pricing.showDiscount) {
                    basePriceEl.textContent = formatCurrency(baseTotal);
                    basePriceEl.style.display = '';
                } else {
                    basePriceEl.style.display = 'none';
                }
            }

            if (totalPriceEl) {
                totalPriceEl.textContent = qty > 1
                    ? `Total for ${qty} items`
                    : 'Total for 1 item';
            }

            if (perUnitHintEl) {
                const weightLabel = product?.is_weight_based && selectedWeight?.label ? ` • ${selectedWeight.label}` : '';
                perUnitHintEl.textContent = `Per item: ${formatCurrency(effectiveSalePrice)}${weightLabel}`;
            }
        }

        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (!productId) {
                window.location.href = '/products';
                return;
            }

            try {
                const data = await api.get(`/products/${productId}`);
                product = data.product;
                renderProduct();
                await loadRelatedProducts(productId);
            } catch (error) {
                console.error('Failed to load product:', error);
                document.getElementById('product-content').innerHTML = 
                    '<p class="text-center">Product not found</p>';
            }
        }

        async function loadRelatedProducts(productId) {
            try {
                const response = await api.get(`/products/${productId}/related?limit=6`);
                renderRelatedProducts(response.related_products || []);
            } catch (error) {
                console.error('Failed to load related products:', error);
                renderRelatedProducts([]);
            }
        }

        function renderRelatedProducts(relatedProducts) {
            const section = document.getElementById('related-products-section');
            if (!section) return;

            if (!Array.isArray(relatedProducts) || relatedProducts.length === 0) {
                section.innerHTML = '';
                return;
            }

            section.innerHTML = `
                <section class="related-products-section">
                    <div class="related-products-header">
                        <div>
                            <h3>Related products</h3>
                            <p>Similar items from the same category to help you discover more.</p>
                        </div>
                        <div class="related-products-nav" aria-label="Related products navigation">
                            <button type="button" class="related-nav-btn" data-direction="prev" aria-label="Scroll related products left"><i class="fas fa-chevron-left"></i></button>
                            <button type="button" class="related-nav-btn" data-direction="next" aria-label="Scroll related products right"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div class="related-products-row" id="related-products-row">
                        ${relatedProducts.map((item) => {
                            const price = item.discount_price != null && item.discount_price < item.price
                                ? item.discount_price
                                : item.price;
                            return `
                                <article class="related-product-card">
                                    <img src="${item.image_url || '/images/placeholder.jpg'}" alt="${item.name}" onerror="this.src='/images/placeholder.jpg'">
                                    <div>
                                        <h4>${item.name}</h4>
                                        <p>${item.category_name || 'Featured item'}</p>
                                    </div>
                                    <div class="price-row">
                                        <strong>${formatCurrency(price || 0)}</strong>
                                        <a href="/product-details?id=${item.id}" class="view-link">View <i class="fas fa-arrow-right"></i></a>
                                    </div>
                                </article>
                            `;
                        }).join('')}
                    </div>
                </section>
            `;

            const relatedRow = document.getElementById('related-products-row');
            const relatedButtons = document.querySelectorAll('.related-nav-btn');

            if (relatedRow && relatedButtons.length) {
                const scrollAmount = () => Math.max(220, Math.floor(relatedRow.clientWidth * 0.85));

                const updateArrowState = () => {
                    const atStart = relatedRow.scrollLeft <= 2;
                    const atEnd = relatedRow.scrollLeft + relatedRow.clientWidth >= relatedRow.scrollWidth - 2;
                    relatedButtons.forEach((button) => {
                        const direction = button.getAttribute('data-direction');
                        button.disabled = direction === 'prev' ? atStart : atEnd;
                    });
                };

                relatedButtons.forEach((button) => {
                    button.addEventListener('click', () => {
                        const direction = button.getAttribute('data-direction') === 'next' ? 1 : -1;
                        relatedRow.scrollBy({
                            left: direction * scrollAmount(),
                            behavior: 'smooth'
                        });
                    });
                });

                relatedRow.addEventListener('scroll', updateArrowState, { passive: true });
                window.addEventListener('resize', updateArrowState, { passive: true });
                updateArrowState();
            }
        }

        async function loadUserAddresses() {
            if (!auth.isAuthenticated()) return;

            try {
                const data = await api.get('/addresses');
                userAddresses = data.addresses || [];

                const defaultAddress = userAddresses.find(a => a.is_default) || userAddresses[0];
                const pinInput = document.getElementById('product-pincode-input');

                if (defaultAddress && pinInput && !pinInput.value) {
                    pinInput.value = String(defaultAddress.postal_code || '').trim();
                    checkProductPincodeAvailability(pinInput.value);
                    return;
                }

                // If there are no saved addresses, prompt user to use current location.
                if ((!userAddresses || userAddresses.length === 0) && pinInput) {
                    // Show friendly, professional prompt asking permission to use location
                    showLocationPrompt()
                        .then(answer => {
                            if (answer === true) {
                                requestAndFillLocation(pinInput);
                            }
                        })
                        .catch(err => {
                            console.warn('Location prompt cancelled or failed:', err);
                        });
                }
            } catch (error) {
                console.error('Failed to load addresses:', error);
            }
        }

        // Show a professional modal asking the user whether to use their current location.
        // Returns a Promise that resolves to true (yes) or false (no).
        function showLocationPrompt() {
            return new Promise((resolve) => {
                if (document.getElementById('use-location-modal')) {
                    // Already shown — resolve false by default
                    resolve(false);
                    return;
                }

                const modal = document.createElement('div');
                modal.id = 'use-location-modal';
                modal.setAttribute('role', 'dialog');
                modal.setAttribute('aria-modal', 'true');
                modal.style.position = 'fixed';
                modal.style.left = '0';
                modal.style.top = '0';
                modal.style.width = '100%';
                modal.style.height = '100%';
                modal.style.display = 'flex';
                modal.style.alignItems = 'center';
                modal.style.justifyContent = 'center';
                modal.style.background = 'rgba(0,0,0,0.35)';
                modal.style.zIndex = '9999';

                const card = document.createElement('div');
                card.style.width = 'min(520px, 94%)';
                card.style.background = '#fff';
                card.style.borderRadius = '12px';
                card.style.boxShadow = '0 6px 24px rgba(15,23,42,0.25)';
                card.style.padding = '20px';
                card.style.fontFamily = 'Arial, sans-serif';
                card.style.color = '#0f172a';

                card.innerHTML = `
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                        <div style="width:44px;height:44px;border-radius:10px;background:#e6f4ea;display:flex;align-items:center;justify-content:center;color:#065f46;font-weight:700;">📍</div>
                        <div>
                            <div style="font-size:1.05rem;font-weight:700;margin-bottom:4px;">Use your current location?</div>
                            <div style="color:#475569;font-size:0.94rem;">We can use your device location to auto-fill your delivery address for faster checkout. This uses your phone's location services.</div>
                        </div>
                    </div>
                    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;">
                        <button id="use-location-no" style="background:transparent;border:1px solid #cbd5e1;padding:8px 12px;border-radius:8px;cursor:pointer;color:#0f172a;">No, thanks</button>
                        <button id="use-location-yes" style="background:#0f5132;color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer;">Yes, use location</button>
                    </div>
                `;

                modal.appendChild(card);
                document.body.appendChild(modal);

                const cleanup = () => {
                    try { document.body.removeChild(modal); } catch (_) {}
                };

                modal.querySelector('#use-location-no').addEventListener('click', () => { cleanup(); resolve(false); });
                modal.querySelector('#use-location-yes').addEventListener('click', () => { cleanup(); resolve(true); });
            });
        }

        // Request geolocation from the browser and fill the pin input and status with address/pincode.
        async function requestAndFillLocation(pinInput) {
            if (!navigator.geolocation) {
                showAlert('Geolocation is not supported by your browser.', 'warning');
                return;
            }

            showAlert('Requesting your location. Please allow location access on your device.', 'info');

            const onError = (err) => {
                console.warn('Geolocation error:', err);
                showAlert('Unable to get location. Please enable device location and try again.', 'error');
            };

            navigator.geolocation.getCurrentPosition(async (position) => {
                try {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const address = await reverseGeocode(lat, lon);

                    const statusEl = document.getElementById('product-pincode-status');
                    if (statusEl) {
                        statusEl.innerHTML = `<span style="color:#065f46;">Detected address: ${escapeHtml(address.display || address.display_name || String(address || ''))}</span>`;
                    }

                    if (pinInput) {
                        const postal = String(address.postcode || address.postal_code || '').trim();
                        if (postal) {
                            pinInput.value = postal;
                            checkProductPincodeAvailability(pinInput.value);
                        } else {
                            // If no postal code, paste the readable address into the input as fallback
                            pinInput.value = String(address.display || address.display_name || `${lat},${lon}`);
                        }
                    }

                    showAlert('Location added. Please verify the address before placing the order.', 'success');
                } catch (err) {
                    console.error('Reverse geocode failed:', err);
                    onError(err);
                }
            }, onError, { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 });
        }

        // Lightweight reverse-geocode using Nominatim (OpenStreetMap). Returns parsed JSON or minimal object.
        async function reverseGeocode(lat, lon) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}`;
                const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
                if (!resp.ok) throw new Error('Geocode lookup failed');
                const data = await resp.json();
                // Map common fields to a friendly shape
                const result = {
                    display: data.display_name,
                    display_name: data.display_name,
                    postcode: data.address?.postcode || data.address?.postal_code || '',
                    raw: data
                };
                return result;
            } catch (error) {
                console.error('reverseGeocode error:', error);
                return { display: '', display_name: '', postcode: '' };
            }
        }

        async function loadProductDeliverySettings() {
            try {
                const resp = await api.get('/products/settings');
                const settings = resp?.settings || {};
                const rawCodPincodes = String(settings.cod_available_pincodes || '').trim();
                quickCodPincodes = rawCodPincodes
                    ? rawCodPincodes.split(/[\n,]+/).map(pin => String(pin || '').trim()).filter(Boolean)
                    : [];
            } catch (error) {
                console.error('Failed to load delivery settings for PIN check:', error);
                quickCodPincodes = [];
            }
        }

        function checkProductPincodeAvailability(inputPin) {
            const pinInput = document.getElementById('product-pincode-input');
            const rawPin = inputPin ?? (pinInput ? pinInput.value : '');
            const pin = String(rawPin || '').trim();
            const statusEl = document.getElementById('product-pincode-status');

            if (!statusEl) return;

            if (!pin) {
                statusEl.innerHTML = '<span style="color: var(--text-secondary); font-size: 0.9rem;">Enter a 6-digit PIN code to check delivery availability.</span>';
                return;
            }

            const normalizedPin = pin.replace(/\D/g, '').slice(0, 6);
            if (normalizedPin.length !== 6) {
                statusEl.innerHTML = '<span style="color: #ef4444; font-size: 0.9rem;"><i class="fas fa-times-circle"></i> Please enter a valid 6-digit PIN code.</span>';
                if (pinInput) pinInput.value = normalizedPin;
                return;
            }

            if (pinInput) pinInput.value = normalizedPin;

            if (!quickCodPincodes.length) {
                statusEl.innerHTML = '<span style="color: #22c55e; font-size: 0.9rem;"><i class="fas fa-check-circle"></i> Delivery / COD is available for PIN ' + normalizedPin + '.</span>';
                return;
            }

            const available = quickCodPincodes.includes(normalizedPin);
            if (available) {
                statusEl.innerHTML = '<span style="color: #22c55e; font-size: 0.9rem;"><i class="fas fa-check-circle"></i> Delivery / COD is available for PIN ' + normalizedPin + '.</span>';
            } else {
                statusEl.innerHTML = '<span style="color: #ef4444; font-size: 0.9rem;"><i class="fas fa-times-circle"></i> Delivery / COD is not available for PIN ' + normalizedPin + '. Please choose GPay.</span>';
            }
        }

        function normalizeWeightUnit(unit) {
            const normalized = (unit || '').toString().trim().toLowerCase();
            if (['g', 'grams', 'gm', 'gram'].includes(normalized)) return 'g';
            if (['kg', 'kilogram', 'kilograms', 'kilo', 'kilo gram'].includes(normalized)) return 'kg';
            return normalized || 'pcs';
        }

        function formatWeightLabel(value, unit) {
            const amount = Number(value);
            if (!Number.isFinite(amount) || amount <= 0) return '0';

            const normalizedUnit = normalizeWeightUnit(unit);
            if (normalizedUnit === 'kg') {
                const kg = amount / 1000;
                return kg % 1 === 0 ? `${kg} kg` : `${kg.toFixed(2).replace(/\.00$/, '').replace(/0$/, '').replace(/\.$/, '')} kg`;
            }

            return amount >= 1000 ? `${(amount / 1000).toFixed(2).replace(/\.00$/, '').replace(/0$/, '').replace(/\.$/, '')} kg` : `${amount} g`;
        }

        function parseWeightOptions(productData) {
            const rawWeightOptions = productData?.weight_options || productData?.size_options || productData?.pack_sizes;

            if (Array.isArray(rawWeightOptions)) {
                return rawWeightOptions
                    .map(option => {
                        if (typeof option === 'string') {
                            const parts = option.split(':');
                            const value = parseFloat(parts[0]);
                            const label = parts[1] ? parts[1].trim() : '';
                            return Number.isFinite(value) ? { value, label: label || formatWeightLabel(value, productData?.unit) } : null;
                        }

                        if (option && typeof option === 'object') {
                            const value = parseFloat(option.value ?? option.size ?? option.weight ?? option.amount);
                            const label = String(option.label || option.name || option.title || '').trim();
                            return Number.isFinite(value) ? { value, label: label || formatWeightLabel(value, option.unit || productData?.unit) } : null;
                        }

                        return null;
                    })
                    .filter(Boolean);
            }

            if (typeof rawWeightOptions === 'string' && rawWeightOptions.trim()) {
                return rawWeightOptions
                    .split(/\n|,/)
                    .map(entry => entry.trim())
                    .filter(Boolean)
                    .map(entry => {
                        const parts = entry.split(':');
                        const value = parseFloat(parts[0]);
                        return Number.isFinite(value) ? { value, label: parts[1] ? parts[1].trim() : formatWeightLabel(value, productData?.unit) } : null;
                    })
                    .filter(Boolean);
            }

            return [];
        }

        function getWeightOptions(productData) {
            const explicitOptions = parseWeightOptions(productData);
            if (explicitOptions.length) return explicitOptions;

            const unit = normalizeWeightUnit(productData?.unit);
            const isWeightProduct = unit === 'g' || unit === 'kg';

            if (!isWeightProduct) {
                return [];
            }

            const rawWeight = parseFloat(productData?.weight ?? 0);
            if (!Number.isFinite(rawWeight) || rawWeight <= 0) {
                return [];
            }

            const baseWeightInGrams = unit === 'kg' ? rawWeight * 1000 : rawWeight;
            const candidateValues = [1, 2, 5]
                .map(multiplier => baseWeightInGrams * multiplier)
                .filter(value => value > 0)
                .map(value => ({ value, label: formatWeightLabel(value, unit) }));

            const seen = new Set();
            return candidateValues.filter(option => {
                const key = Number(option.value);
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        function getDeliveryMessage(productData) {
            const explicitMessage = [
                productData?.delivery_message,
                productData?.delivery_time_text,
                productData?.delivery_note,
                productData?.delivery_label
            ]
                .map(value => String(value || '').trim())
                .find(Boolean);

            if (explicitMessage) return explicitMessage;

            const unitInfo = getUnitInfo(productData);
            const weightValue = parseFloat(productData?.weight || 0);
            if (Number.isFinite(weightValue) && weightValue > 0) {
                return `Delivery available for ${weightValue} ${unitInfo.unit}`;
            }

            return 'Delivery information is available during checkout.';
        }

        function getUnitInfo(p) {
            const rawUnit = (p && typeof p.unit === 'string') ? p.unit.trim() : '';
            const normalizedUnit = rawUnit.toLowerCase();
            if (['pcs', 'pc', 'piece', 'pieces', 'item', 'items'].includes(normalizedUnit)) {
                const friendlyUnit = normalizedUnit === 'pcs' || normalizedUnit === 'pc' ? 'piece' : normalizedUnit;
                return { unit: friendlyUnit, per: friendlyUnit };
            }

            if (rawUnit) return { unit: rawUnit, per: rawUnit };

            const weightNum = p && p.weight != null ? parseFloat(p.weight) : NaN;
            if (Number.isFinite(weightNum) && weightNum > 0) return { unit: 'kg', per: 'kg' };

            return { unit: 'item', per: 'item' };
        }

        function renderStars(value, size = '1rem') {
            const safeValue = Math.max(0, Math.min(5, Number(value) || 0));
            const full = Math.floor(safeValue);
            const hasHalf = safeValue - full >= 0.5;
            const stars = [];

            for (let i = 0; i < 5; i += 1) {
                if (i < full) {
                    stars.push(`<span style="color:#f59e0b;font-size:${size};">★</span>`);
                } else if (i === full && hasHalf) {
                    stars.push(`<span style="color:#f59e0b;font-size:${size};">★</span>`);
                } else {
                    stars.push(`<span style="color:#cbd5e1;font-size:${size};">☆</span>`);
                }
            }

            return stars.join('');
        }

        function getRatingSummaryText(averageRating, ratingCount) {
            const safeAverage = Math.max(0, Math.min(5, Number(averageRating) || 0));
            const safeCount = Number.isFinite(Number(ratingCount)) ? Math.max(0, Number(ratingCount)) : 0;

            if (!safeCount) return 'No ratings yet';
            return `${safeAverage.toFixed(1)}/5 • ${safeCount} rating${safeCount === 1 ? '' : 's'}`;
        }

            const maxWeightAmount = getMaxWeightAmount(product);

            const selectedWeightGrams = getSelectedWeightInGrams(selectedWeight, product);
            const requestedWeightGrams = selectedWeightGrams * Math.max(1, Number(selectedQuantity) || 1);
            const remainingWeightGrams = Math.max(0, maxWeightAmount - requestedWeightGrams);
            const remainingWeightLabel = remainingWeightGrams > 0 ? formatWeightLabel(remainingWeightGrams, product?.weight_unit || product?.unit || 'g') : '0 g';

            if (product?.is_weight_based) {
                if (!selectedWeightOption) {

            const averageRating = Number(product.average_rating || 0);
