        let selectedProductRating = 0;
        let selectedWeightOption = null;

        function selectProductRating(value) {
            selectedProductRating = value;
            const buttons = document.querySelectorAll('.rating-option');
            buttons.forEach((button) => {
                const isSelected = Number(button.dataset.rating) <= value;
                button.style.color = isSelected ? '#f59e0b' : '#cbd5e1';
                button.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
            });

            const statusEl = document.getElementById('product-rating-status');
            if (statusEl) {
                statusEl.textContent = `You selected ${value} star${value === 1 ? '' : 's'}.`;
            }
        }

        async function submitProductRating() {
            if (!auth.isAuthenticated()) {
                showAlert('Please login to rate this product.', 'error');
                setTimeout(() => { window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname + window.location.search); }, 1200);
                return;
            }

            if (!selectedProductRating || selectedProductRating < 1 || selectedProductRating > 5) {
                showAlert('Please select a star rating before submitting.', 'error');
                return;
            }

            try {
                const review = document.getElementById('product-review-input')?.value || '';
                await api.post(`/products/${product.id}/rating`, { rating: selectedProductRating, review });
                const statusEl = document.getElementById('product-rating-status');
                if (statusEl) statusEl.textContent = 'Thanks for your rating!';
                showAlert('Your rating has been saved.', 'success');
                const refreshed = await api.get(`/products/${product.id}`);
                product = refreshed.product;
                renderProduct();
                await loadRelatedProducts(product.id);
            } catch (error) {
                console.error('Submit product rating failed:', error);
                showAlert(error?.message || 'Failed to submit your rating.', 'error');
            }
        }

        function getShareUrl() {
            if (product && product.id != null) {
                return `${window.location.origin}/product-details?id=${encodeURIComponent(String(product.id))}`;
            }
            return window.location.href;
        }

        function getSharePayload() {
            const url = getShareUrl();
            const pricing = getCurrentPricing();
            const priceText = pricing?.salePrice ? formatCurrency(pricing.salePrice) : '';
            const title = product?.name ? String(product.name) : 'Product';
            const text = priceText ? `${title} (${priceText})` : title;
            return { title, text, url };
        }

        function toggleProductShareMenu(event) {
            try { event?.stopPropagation?.(); } catch (_) { /* ignore */ }
            const menu = document.getElementById('product-share-menu');
            if (!menu) return;

            const isHidden = menu.classList.contains('hidden');
            // Close any open menu first
            menu.classList.add('hidden');
            if (isHidden) {
                menu.classList.remove('hidden');
            }
        }

        function closeProductShareMenu() {
            const menu = document.getElementById('product-share-menu');
            if (!menu) return;
            menu.classList.add('hidden');
        }

        async function copyTextToClipboard(value) {
            const text = String(value || '').trim();
            if (!text) return false;
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                    return true;
                }
            } catch (_) {
                // fall through
            }

            try {
                const el = document.createElement('textarea');
                el.value = text;
                el.setAttribute('readonly', '');
                el.style.position = 'fixed';
                el.style.top = '-1000px';
                el.style.left = '-1000px';
                document.body.appendChild(el);
                el.select();
                const ok = document.execCommand('copy');
                document.body.removeChild(el);
                return !!ok;
            } catch (_) {
                return false;
            }
        }

        async function shareProduct(target) {
            closeProductShareMenu();
            const { title, text, url } = getSharePayload();
            const message = `${text}\n${url}`.trim();

            const safeOpen = (shareUrl) => {
                try {
                    window.open(shareUrl, '_blank', 'noopener,noreferrer');
                } catch (_) {
                    window.location.href = shareUrl;
                }
            };

            if (target === 'copy') {
                const ok = await copyTextToClipboard(url);
                if (typeof showAlert === 'function') {
                    showAlert(ok ? 'Link copied!' : 'Copy failed. Please copy the link from the address bar.', ok ? 'success' : 'error');
                } else {
                    alert(ok ? 'Link copied!' : 'Copy failed.');
                }
                return;
            }

            // Native share (best way to share into WhatsApp/Facebook/Instagram apps on mobile)
            if (target === 'native' || target === 'instagram') {
                if (navigator.share) {
                    try {
                        await navigator.share({ title, text, url });
                        return;
                    } catch (_) {
                        // user cancelled or not supported for this payload
                    }
                }
            }

            if (target === 'whatsapp') {
                safeOpen(`https://wa.me/?text=${encodeURIComponent(message)}`);
                return;
            }

            if (target === 'facebook') {
                safeOpen(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(text)}`);
                return;
            }

            if (target === 'instagram') {
                // Instagram doesn't support a reliable web share URL like WhatsApp/Facebook.
                // Real working path on mobile is the native share sheet; otherwise copy link.
                const ok = await copyTextToClipboard(url);
                safeOpen('https://www.instagram.com/');
                if (typeof showAlert === 'function') {
                    showAlert(ok ? 'Link copied. Paste it in Instagram.' : 'Open Instagram and paste the link.', ok ? 'success' : 'info');
                }
                return;
            }
        }

        function normalizeManualWeightUnit(unit) {
            const normalized = String(unit || '').trim().toLowerCase();
            if (['g', 'grams', 'gm', 'gram'].includes(normalized)) return 'g';
            if (['kg', 'kilogram', 'kilograms', 'kilo', 'kilo gram'].includes(normalized)) return 'kg';
            return 'g';
        }

        function getManualWeightSelection() {
            const amountInput = document.getElementById('custom-weight-value');
            const unitSelect = document.getElementById('custom-weight-unit');
            const amount = Number.parseFloat(amountInput?.value ?? '');

            if (!Number.isFinite(amount) || amount <= 0) {
                return null;
            }

            const unit = normalizeManualWeightUnit(unitSelect?.value || product?.weight_unit || product?.unit || 'g');
            const label = `${amount} ${unit}`;

            return {
                value: amount,
                label,
                unit
            };
        }

        function syncManualWeightSelection() {
            const manualSelection = getManualWeightSelection();
            const amountInput = document.getElementById('custom-weight-value');
            const maxAllowedWeight = getMaxAllowedWeightPerItem(product, selectedQuantity);

            if (!manualSelection) {
                selectedWeightOption = null;
                if (amountInput) {
                    amountInput.value = '';
                }
                document.querySelectorAll('[data-weight-option]').forEach((btn) => {
                    btn.style.background = 'var(--bg-primary)';
                    btn.style.color = 'var(--text-primary)';
                    btn.style.borderColor = 'var(--border-primary)';
                });
                if (typeof updateDisplayedPrice === 'function') {
                    updateDisplayedPrice();
                }
                return;
            }

            const selectedGrams = getWeightInGrams(manualSelection.value, manualSelection.unit || product?.weight_unit || product?.unit || 'g');
            const effectiveMaxGrams = maxAllowedWeight > 0 ? Math.min(maxAllowedWeight, 50000) : 50000;

            if (selectedGrams > effectiveMaxGrams) {
                const clampedGrams = Math.min(selectedGrams, effectiveMaxGrams);
                const clampedUnit = normalizeWeightUnit(manualSelection.unit || product?.weight_unit || product?.unit || 'g');
                const safeValue = clampedUnit === 'kg' ? clampedGrams / 1000 : clampedGrams;
                if (amountInput) {
                    amountInput.value = safeValue;
                }
                selectedWeightOption = {
                    value: safeValue,
                    label: formatWeightLabel(clampedGrams, manualSelection.unit || product?.weight_unit || product?.unit || 'g'),
                    unit: manualSelection.unit || product?.weight_unit || product?.unit || 'g'
                };
                if (typeof showAlert === 'function') {
                    showAlert('Weight adjusted to the maximum amount available for this purchase.', 'info');
                }
            } else {
                selectedWeightOption = manualSelection;
            }

            document.querySelectorAll('[data-weight-option]').forEach((btn) => {
                btn.style.background = 'var(--bg-primary)';
                btn.style.color = 'var(--text-primary)';
                btn.style.borderColor = 'var(--border-primary)';
            });
            if (typeof updateDisplayedPrice === 'function') {
                updateDisplayedPrice();
            }
        }

        function applyCustomWeightFromInput() {
            const manualSelection = getManualWeightSelection();
            if (!manualSelection) {
                selectedWeightOption = null;
                document.querySelectorAll('[data-weight-option]').forEach((btn) => {
                    btn.style.background = 'var(--bg-primary)';
                    btn.style.color = 'var(--text-primary)';
                    btn.style.borderColor = 'var(--border-primary)';
                });
                if (typeof updateDisplayedPrice === 'function') {
                    updateDisplayedPrice();
                }
                return;
            }

            selectedWeightOption = manualSelection;
            document.querySelectorAll('[data-weight-option]').forEach((btn) => {
                btn.style.background = 'var(--bg-primary)';
                btn.style.color = 'var(--text-primary)';
                btn.style.borderColor = 'var(--border-primary)';
            });

            if (typeof updateDisplayedPrice === 'function') {
                updateDisplayedPrice();
            }

            if (typeof showAlert === 'function') {
                showAlert(`Selected ${manualSelection.label} for this product.`, 'info');
            }
        }

        function getSelectedWeightForOrder() {
            if (!product?.is_weight_based) {
                selectedWeightOption = null;
                return null;
            }

            const manualSelection = getManualWeightSelection();
            if (manualSelection) {
                return manualSelection;
            }

            const amountInput = document.getElementById('custom-weight-value');
            if (amountInput && String(amountInput.value || '').trim() === '') {
                return null;
            }

            return selectedWeightOption || null;
        }

        function selectProductWeight(value, buttonEl) {
            selectedWeightOption = {
                value,
                label: (buttonEl && buttonEl.getAttribute('data-weight-label')) || formatWeightLabel(value, product?.unit || 'g'),
                unit: product?.weight_unit || product?.unit || 'g'
            };

            const weightInput = document.getElementById('custom-weight-value');
            const weightUnit = document.getElementById('custom-weight-unit');
            if (weightInput) weightInput.value = value;
            if (weightUnit) weightUnit.value = normalizeWeightUnit(product?.weight_unit || product?.unit || 'g');

            document.querySelectorAll('[data-weight-option]').forEach((btn) => {
                btn.style.background = 'var(--bg-primary)';
                btn.style.color = 'var(--text-primary)';
                btn.style.borderColor = 'var(--border-primary)';
            });

            if (buttonEl) {
                buttonEl.style.background = 'var(--primary)';
                buttonEl.style.color = '#fff';
                buttonEl.style.borderColor = 'var(--primary)';
            }

            const label = (buttonEl && buttonEl.getAttribute('data-weight-label'))
                || formatWeightLabel(value, product?.unit || 'g');

            if (typeof showAlert === 'function') {
                showAlert(`Selected ${label} for this product.`, 'info');
            }
        }

        function selectProductImage(thumbnailElement) {
            const mainImage = document.getElementById('product-main-image');
            if (!mainImage || !thumbnailElement) return;

            const newImage = thumbnailElement.getAttribute('data-image');
            if (!newImage) return;

            mainImage.src = newImage;
            document.querySelectorAll('.product-thumbnail').forEach((thumbnail) => {
                thumbnail.classList.remove('active');
            });
            thumbnailElement.classList.add('active');
        }

        function openImageLightbox(imageSrc, imageAlt = 'Product image') {
            if (!imageSrc) return;
            const lightbox = document.getElementById('image-lightbox');
            const lightboxImage = document.getElementById('lightbox-image');
            if (!lightbox || !lightboxImage) return;

            lightboxImage.src = imageSrc;
            lightboxImage.alt = imageAlt;
            lightbox.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeImageLightbox() {
            const lightbox = document.getElementById('image-lightbox');
            const lightboxImage = document.getElementById('lightbox-image');
            if (!lightbox || !lightboxImage) return;

            lightbox.classList.add('hidden');
            lightboxImage.src = '';
            document.body.style.overflow = '';
        }

        function handleLightboxBackdropClick(event) {
            if (event.target && event.target.id === 'image-lightbox') {
                closeImageLightbox();
            }
        }

        function updateQuantity(value) {
            const step = getQuantityStep();
            const maxQty = parseInt(product.stock_quantity, 10);
            const hasMax = Number.isFinite(maxQty) && maxQty > 0;

            let qty = parseInt(value, 10);
            if (!Number.isFinite(qty) || qty <= 0) qty = step;

            if (hasMax && maxQty < step) {
                selectedQuantity = maxQty;
                document.getElementById('quantity').value = selectedQuantity;
                updateDisplayedPrice();
                return;
            }

            qty = Math.max(step, qty);
            if (hasMax) qty = Math.min(qty, maxQty);

            if (step > 1) {
                qty = Math.ceil(qty / step) * step;
                if (hasMax && qty > maxQty) {
                    qty = Math.floor(maxQty / step) * step;
                }
                qty = Math.max(step, qty);
            }

            if (hasMax) qty = Math.min(qty, maxQty);

            selectedQuantity = qty;
            document.getElementById('quantity').value = selectedQuantity;
            clampManualWeightSelectionForCurrentQuantity();
            updateDisplayedPrice();
        }

        function incrementQuantity() {
            const step = getQuantityStep();
            const maxQty = parseInt(product.stock_quantity, 10);
            const hasMax = Number.isFinite(maxQty) && maxQty > 0;

            if (hasMax && maxQty < step) {
                selectedQuantity = maxQty;
                document.getElementById('quantity').value = selectedQuantity;
                updateDisplayedPrice();
                return;
            }

            const next = selectedQuantity + step;
            if (!hasMax || next <= maxQty) {
                selectedQuantity = next;
                document.getElementById('quantity').value = selectedQuantity;
                clampManualWeightSelectionForCurrentQuantity();
                updateDisplayedPrice();
            }
        }

        function decrementQuantity() {
            const step = getQuantityStep();
            const next = Math.max(step, selectedQuantity - step);
            if (next !== selectedQuantity) {
                selectedQuantity = next;
                document.getElementById('quantity').value = selectedQuantity;
                clampManualWeightSelectionForCurrentQuantity();
                updateDisplayedPrice();
            }
        }

        async function handleAddToCart() {
            if (!auth.isAuthenticated()) {
                showAlert('Please login to add items to cart', 'error');
                setTimeout(() => window.location.href = '/login', 1500);
                return;
            }
            if ((product.stock_quantity || 0) <= 0) {
                showAlert('This product is out of stock.', 'error');
                return;
            }
            const selectedWeight = product?.is_weight_based ? getSelectedWeightForOrder() : null;

            try {
                await cart.add(product.id, selectedQuantity, {
                    weight_label: selectedWeight?.label || null,
                    weight_value: selectedWeight?.value ?? null,
                    weight_unit: selectedWeight?.unit || null
                });
                showAddToCartSuccess();
                showAlert('Added to cart successfully!', 'success');
            } catch (error) {
                console.error('Add to cart error:', error);
                showAlert(error.message || 'Failed to add to cart', 'error');
            }
        }

        async function handleBuyNow() {
            if (!auth.isAuthenticated()) {
                showAlert('Please login to buy products', 'error');
                setTimeout(() => window.location.href = '/login', 1500);
                return;
            }
            if ((product.stock_quantity || 0) <= 0) {
                showAlert('This product is out of stock.', 'error');
                return;
            }

            const basePrice = parseFloat(product.price || 0);
            const discountPrice = product.discount_price != null ? parseFloat(product.discount_price) : null;
            const baseSellingPrice = (discountPrice !== null && discountPrice < basePrice) ? discountPrice : basePrice;
            const selectedWeight = product?.is_weight_based ? getSelectedWeightForOrder() : null;
            const weightMultiplier = product?.is_weight_based && selectedWeight ? getWeightMultiplierForSelection(product, selectedWeight) : 1;
            const sellingPrice = baseSellingPrice * weightMultiplier;


            const directBuyItem = {
                product_id: product.id,
                id: product.id,
                name: product.name,
                price: sellingPrice,
                original_price: (discountPrice !== null && discountPrice < basePrice) ? basePrice : null,
                quantity: selectedQuantity,
                stock_quantity: product.stock_quantity,
                weight_label: selectedWeight?.label || null,
                weight_value: selectedWeight?.value ?? null,
                weight_unit: selectedWeight?.unit || null
            };

            sessionStorage.setItem('directBuyItem', JSON.stringify(directBuyItem));
            window.location.href = '/checkout?directbuy=1';
        }

        function showAddressSelectionModal() {
            const defaultAddress = userAddresses.find(a => a.is_default) || userAddresses[0];
            
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header-row">
                        <h3>Select Delivery Address</h3>
                        <button type="button" class="modal-close-btn" onclick="this.closest('.modal-overlay').remove()" aria-label="Close">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div style="margin: 1.5rem 0;">
                        ${userAddresses.map(addr => `
                            <div class="address-option" style="margin-bottom: 1rem; padding: 1rem; border: 2px solid ${addr.id === defaultAddress.id ? 'var(--primary)' : 'var(--border)'}; border-radius: 8px; cursor: pointer;" 
                                 onclick="selectAddress(${addr.id})">
                                <input type="radio" name="address" value="${addr.id}" ${addr.id === defaultAddress.id ? 'checked' : ''}>
                                <strong>${addr.label}</strong>
                                <p style="margin: 0.5rem 0 0 1.5rem; color: var(--text-secondary);">
                                    ${addr.full_name}<br>
                                    ${addr.address_line1}${addr.address_line2 ? ', ' + addr.address_line2 : ''}<br>
                                    ${addr.city}, ${addr.state} ${addr.postal_code}<br>
                                    ${addr.phone}
                                </p>
                            </div>
                        `).join('')}
                    </div>
                    <div style="margin: 0 0 1.25rem; padding: 1rem; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-secondary);">
                        <h4 style="margin: 0 0 0.75rem;">Payment Method</h4>
                        <div class="form-group" style="margin-bottom: 0.75rem;">
                            <label class="form-label">Select Payment</label>
                            <select id="quick_payment_method" class="form-select" required>
                                <option value="cash_on_delivery">Cash on Delivery</option>
                                <option value="gpay">Google Pay (UPI)</option>
                            </select>
                        </div>
                        <div id="quick-gpay-details" class="hidden">
                            <div class="form-group" style="margin-bottom: 0.75rem;">
                                <label class="form-label">GPay detail to share</label>
                                <select id="quick-gpay-detail-type" class="form-select">
                                    <option value="upi">UPI ID</option>
                                    <option value="phone">Phone Number</option>
                                    <option value="qr">QR Code / Link</option>
                                </select>
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label id="quick-gpay-detail-label" class="form-label">UPI ID</label>
                                <input type="text" id="quick-gpay-detail-value" class="form-input" placeholder="e.g. name@upi">
                                <div class="form-help">This is shared only with the owner for payment confirmation.</div>
                            </div>
                        </div>
                        <!-- COD pincode check -->
                        <div id="quick-cod-details">
                            <div style="padding: 0.75rem 0.9rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-secondary); font-size: 0.9rem;">
                                <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.3rem;">
                                    <i class="fas fa-map-marker-alt" style="color:var(--primary);"></i>
                                    <strong>Delivery Pincode</strong>
                                </div>
                                <div id="quick-cod-pincode-display" style="font-size:1rem; font-weight:600; color:var(--text-primary); margin-bottom:0.3rem;">${defaultAddress.postal_code || '—'}</div>
                                <div id="quick-cod-pincode-status"></div>
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                        <button class="btn btn-primary" onclick="confirmBuyNow()">Confirm Order</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            window.selectedAddressId = defaultAddress.id;

            const paymentSelect = document.getElementById('quick_payment_method');
            if (paymentSelect) {
                paymentSelect.addEventListener('change', toggleQuickGpayDetails);
            }
            toggleQuickGpayDetails();
            // Initialize COD pincode check for the default address
            updateQuickCodPincodeCheck(defaultAddress.postal_code);
        }

        function formatQuickGpayLabel(type) {
            if (type === 'phone') return 'Phone Number';
            if (type === 'qr') return 'QR Code / Link';
            return 'UPI ID';
        }

        function toggleQuickGpayDetails() {
            const paymentSelect = document.getElementById('quick_payment_method');
            const gpaySection = document.getElementById('quick-gpay-details');
            const codSection = document.getElementById('quick-cod-details');
            const typeSelect = document.getElementById('quick-gpay-detail-type');
            const labelEl = document.getElementById('quick-gpay-detail-label');
            const valueInput = document.getElementById('quick-gpay-detail-value');
            if (!paymentSelect || !gpaySection) return;

            const isGpay = paymentSelect.value === 'gpay';
            gpaySection.classList.toggle('hidden', !isGpay);
            if (codSection) codSection.style.display = isGpay ? 'none' : '';

            if (typeSelect && labelEl) {
                labelEl.textContent = formatQuickGpayLabel(typeSelect.value);
                typeSelect.onchange = () => {
                    labelEl.textContent = formatQuickGpayLabel(typeSelect.value);
                    if (valueInput) valueInput.placeholder = typeSelect.value === 'phone' ? 'e.g. +91 98765 43210' : (typeSelect.value === 'qr' ? 'e.g. link or description' : 'e.g. name@upi');
                };
            }

            // Refresh COD check when switching to COD
            if (!isGpay) {
                const addr = userAddresses.find(a => a.id === window.selectedAddressId);
                updateQuickCodPincodeCheck(addr ? addr.postal_code : '');
            }
        }

        function updateQuickCodPincodeCheck(pincode) {
            const displayEl = document.getElementById('quick-cod-pincode-display');
            const statusEl = document.getElementById('quick-cod-pincode-status');
            if (!displayEl || !statusEl) return;

            const pin = String(pincode || '').trim();
            displayEl.textContent = pin || '—';

            if (!pin) {
                statusEl.innerHTML = '<span style="color:var(--text-secondary);font-size:0.82rem;">No pincode found for selected address.</span>';
                return;
            }
            // If no COD PIN restrictions are configured, the availability list is open.
            if (!quickCodPincodes.length) {
                statusEl.innerHTML = '<span style="color:#22c55e;font-size:0.82rem;"><i class="fas fa-check-circle"></i> No COD PIN restrictions are configured in admin, so COD is available for this PIN.</span>';
                return;
            }
            const available = quickCodPincodes.includes(pin);
            if (available) {
                statusEl.innerHTML = '<span style="color:#22c55e;font-size:0.82rem;"><i class="fas fa-check-circle"></i> Cash on Delivery is available at your pincode.</span>';
            } else {
                statusEl.innerHTML = '<span style="color:#ef4444;font-size:0.82rem;"><i class="fas fa-times-circle"></i> COD is not available at your pincode. Please choose GPay to continue.</span>';
            }
        }

        function selectAddress(addressId) {
            window.selectedAddressId = addressId;
            document.querySelectorAll('.address-option').forEach(el => {
                el.style.borderColor = 'var(--border)';
            });
            event.currentTarget.style.borderColor = 'var(--primary)';
            // Refresh COD pincode check for newly selected address
            const addr = userAddresses.find(a => a.id === addressId);
            if (addr) updateQuickCodPincodeCheck(addr.postal_code);
        }

        async function confirmBuyNow() {
            const addressId = window.selectedAddressId;
            const address = userAddresses.find(a => a.id === addressId);
            
            if (!address) {
                showAlert('Please select an address', 'error');
                return;
            }

            try {
                const paymentMethod = document.getElementById('quick_payment_method')?.value || 'cash_on_delivery';
                let notes = 'Quick Buy Order';

                if (paymentMethod === 'gpay') {
                    const type = document.getElementById('quick-gpay-detail-type')?.value || 'upi';
                    const value = (document.getElementById('quick-gpay-detail-value')?.value || '').trim();
                    if (!value) {
                        showAlert(`Please enter your ${formatQuickGpayLabel(type)} for GPay.`, 'error');
                        return;
                    }
                    notes = `GPay via ${formatQuickGpayLabel(type)}: ${value}`;
                }

                const response = await api.post('/orders/quick-buy', {
                    product_id: product.id,
                    quantity: selectedQuantity,
                    shipping_address: {
                        address_id: address.id,
                        full_name: address.full_name,
                        phone: address.phone,
                        address_line1: address.address_line1,
                        address_line2: address.address_line2,
                        city: address.city,
                        state: address.state,
                        postal_code: address.postal_code,
                        country: address.country
                    },
                    payment_method: paymentMethod,
                    notes
                });
                
                document.querySelector('.modal-overlay').remove();
                showAlert('Order placed successfully! Order #' + response.order.order_number, 'success');
                setTimeout(() => window.location.href = '/orders', 2000);
            } catch (error) {
                console.error('Buy now error:', error);
                showAlert(error.message || 'Failed to place order', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await auth.checkAuth();
            await cart.fetch();
            await loadProductDeliverySettings();
            await loadProduct();
            await loadUserAddresses();

            // Auto-trigger quick buy modal if arriving from homepage Buy Now
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('quickbuy') === '1') {
                const qtyParam = parseInt(urlParams.get('qty'), 10);
                if (qtyParam > 0) {
                    selectedQuantity = qtyParam;
                    const qtyInput = document.getElementById('quantity');
                    if (qtyInput) qtyInput.value = qtyParam;
                }
                // Small delay to let the page render first
                setTimeout(() => handleBuyNow(), 300);
            }

            // Close share menu on outside click
            document.addEventListener('click', () => {
                closeProductShareMenu();
            });

            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    closeImageLightbox();
                    closeProductShareMenu();
                }
            });

            // Account dropdown toggle
            const accountToggle = document.getElementById('account-toggle');
            const accountDropdown = document.getElementById('account-dropdown');

            if (accountToggle && accountDropdown) {
                accountToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    accountDropdown.classList.toggle('hidden');
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.account-menu')) {
                        accountDropdown.classList.add('hidden');
                    }
                });
            }

            // Account logout handler
            const accountLogout = document.getElementById('account-logout');
            if (accountLogout) {
                accountLogout.addEventListener('click', async () => {
                    if (await showConfirmDialog('Are you sure you want to logout?', { title: 'Logout', confirmText: 'Logout' })) {
                        await auth.logout();
                    }
                });
            }
        });
    </script>
</body>
</html>
